app = "hopeofglory"
primary_region = "jnb"

[build]

[env]
  PAYROLL_DATA_DIR = "/data"
  PAYROLL_ADMIN_USER = "admin"

[[mounts]]
  source = "hog_data"
  destination = "/data"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
